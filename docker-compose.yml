services:
  postgres:
    image: postgres:16
    container_name: curiogo-postgres
    environment:
      POSTGRES_DB: curiogo
      POSTGRES_USER: curiogo
      POSTGRES_PASSWORD: curiogo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curiogo -d curiogo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
