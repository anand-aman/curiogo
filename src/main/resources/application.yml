spring:
  application:
    name: curiogo

  threads:
    virtual:
      enabled: true

  # Connection details come from the environment so no secret lives in source.
  # DB_URL / DB_USER have sensible local defaults; DB_PASSWORD has NONE on purpose
  # (a missing password fails startup fast instead of connecting silently).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/curiogo}
    username: ${DB_USER:curiogo}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      # Liquibase owns the schema. Hibernate only checks that the entity
      # matches the migrated tables and never alters the database.
      ddl-auto: validate
      # Keep the persistence context out of the view layer (the redirect hot
      # path should not hold an open session / transaction).
      open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


# Application-specific knobs (bound via @ConfigurationProperties later).
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  click-flush-ms: 5000
  expiry-sweep-cron: "0 0 * * * *"

  #Encoding mechanism:: "Sqids is planned for later phase"
  encoder: ${APP_ENCODER:base62}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
        application: ${spring.application.name}

logging:
  pattern:
    correlation: "[%X{correlationId:-}]"
  level:
#    root: INFO
    com.curiodesk.curiogo: INFO
#    org.springframework.web: INFO
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

  structured:
    format:
      console: ecs

